<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ожидание приглашения - AIAdminka</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'sha384-QjwLundxB4NaHWOfxQoy8G+BY7T7kjRSxeKIjdPAUQ76EitE8bUlehJxnQEJquiL' 'sha384-cdYhdOlBc0MtESQfAGUIQ6Mf8mJZZ9E9VOP6SAR7sOvPVvRwQlwQ8UR6AjsGDSW3' 'sha384-/YOimVOt6Bq+nJVuTUHWt8a0+2GkUKsKQKq9P9jNkKqsupthdkM6WWQaaVIlnig/' 'sha384-wgqcWx+Dzs2/x1d1yYLKO34rUT5WhUT+OSqnt51rzc/Hi6CBs3tTpstly4/Hwv2y' 'sha384-sChJXbOWDzAc/w2cKkZyzzTmyVLtLgALn0PCewYcW4Nv4WHOMwANhSAqDFQyu3Iq' 'sha384-WO+CQNc5o8u/05JkylStFXt6f895hAovGF97PqyaWgflx6csiESfjnPzUJUrNAfk'; worker-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://accounts.google.com https://www.googleapis.com https://cdn.jsdelivr.net">
    <link rel="preload" as="font" href="../shared/fonts/TTFirsNeue-Regular.woff2" type="font/woff2" crossorigin>
    <link rel="preload" as="font" href="../shared/fonts/TTFirsNeue-Bold.woff2" type="font/woff2" crossorigin>
    <link rel="icon" type="image/svg+xml" href="../shared/icons/favicon.svg">
    <!-- Phase 35 ROLLOUT-03: cascade order declaration FIRST (Phase 25 CSS-01) -->
    <link rel="stylesheet" href="../shared/css/_layers.css">
    <link rel="stylesheet" href="../shared/css/design-system-login.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/waiting-invite.css">
    <!-- Phase 35 ROLLOUT-03: cdn-deps (signals + Lit) + components aggregator (registers <app-modal>) -->
    <script type="module" src="../shared/js/cdn-deps.js"></script>
    <script type="module" src="../shared/components/index.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-card-wide">
            <!-- Left: User Info Panel -->
            <div class="login-card-left">
                <div class="login-logo">
                    <h1>AIAdminka</h1>
                </div>

                <div class="login-user" id="userInfo">
                    <div class="user-avatar" id="userAvatar"></div>
                    <div class="user-info">
                        <div class="user-name" id="userName"></div>
                        <div class="user-email" id="userEmail"></div>
                        <div class="user-role-badge">
                            <span class="badge badge-info">Гость</span>
                        </div>
                    </div>
                </div>

                <div class="login-card-actions">
                    <button class="btn btn--ghost btn-sm" id="btnRefresh" data-action="refresh">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <path d="M23 4v6h-6"/>
                            <path d="M1 20v-6h6"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                        <span>Обновить</span>
                    </button>
                    <button class="btn btn-danger" data-action="logout">
                        Выйти из аккаунта
                    </button>
                </div>

                <div class="login-footer">
                    <span>AIAdminka <span class="app-version" data-format="short"></span></span>
                </div>
            </div>

            <!-- Right: Content Panel -->
            <div class="login-card-right">
                <!-- Waiting Content (default state) -->
                <div class="waiting-content" id="waitingContent">
                    <div class="waiting-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="8.5" cy="7" r="4"/>
                            <line x1="20" y1="8" x2="20" y2="14"/>
                            <line x1="23" y1="11" x2="17" y2="11"/>
                        </svg>
                    </div>
                    <h2 class="waiting-title">Ваш аккаунт одобрен</h2>
                    <p class="waiting-description">
                        Администратор одобрил ваш запрос на регистрацию.<br>
                        Ожидайте приглашения от руководителя команды.
                    </p>
                </div>

                <!-- Invites List -->
                <div class="invites-section hidden" id="invitesSection">
                    <h3 class="invites-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                        <span>Приглашения</span>
                    </h3>
                    <div class="invites-list" id="invitesList"></div>
                </div>

                <!-- No Invites Message -->
                <div class="no-invites hidden" id="noInvites">
                    <div class="no-invites-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3zm-8.27 4a2 2 0 0 1-3.46 0"/>
                        </svg>
                    </div>
                    <p>У вас пока нет приглашений</p>
                    <span class="no-invites-hint">Сообщите руководителю команды, чтобы отправил вам приглашение.</span>
                </div>

                <!-- Loading State -->
                <div class="invites-loading hidden" id="invitesLoading">
                    <div class="spinner"></div>
                    <p>Проверка приглашений...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirm Modal — Phase 35 ROLLOUT-03: <app-modal> (focus trap + Escape + body.overflow + X close button baked in) -->
    <app-modal id="confirmModal" title="Подтверждение" size="sm">
        <p id="confirmMessage"></p>
        <p id="confirmDescription" class="hidden"></p>
        <div slot="footer">
            <button class="btn btn-secondary btn-sm" data-action="confirm-cancel">Отмена</button>
            <button class="btn btn-primary btn-sm" id="confirmAcceptBtn" data-action="confirm-ok">Подтвердить</button>
        </div>
    </app-modal>

    <script defer src="../shared/js/toast.js"></script>
    <script defer src="../shared/js/error-handler.js"></script>
    <script defer src="../shared/utils.js"></script>
    <script defer src="../shared/version.js"></script>
    <script defer src="../shared/env-config.js"></script>
    <script defer src="../shared/cloud-storage.js"></script>
    <script defer src="js/waiting-invite.js"></script>
</body>
</html>
