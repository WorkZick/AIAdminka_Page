<!DOCTYPE html>
<html lang="ru">
<head>
    <style>body{background:#0d0d0d}body:not(.lifecycle-ready) .main-wrapper{opacity:0}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://accounts.google.com 'sha256-8sMhKaZvp1SL2qx1Dq84c+e0UOH8/W/+D1xMSa4yLts=' 'sha256-vvt4KWwuNr51XfE5m+hzeNEGhiOfZzG97ccfqGsPwvE='; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://accounts.google.com https://cdn.jsdelivr.net; frame-ancestors 'self'">
    <title>Отчеты - AIAdminka</title>
    <link rel="icon" type="image/svg+xml" href="../shared/icons/favicon.svg">
    <link rel="stylesheet" href="../shared/css/design-system.css">
    <link rel="stylesheet" href="css/excel-reports.css">
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"
            integrity="sha384-Pqp51FUN2/qzfxZxBCtF0stpc9ONI6MYZpVqmo8m20SoaQCzf+arZvACkLkirlPz"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Container -->
        <div id="sidebar-container"></div>

        <!-- Loading state (visible until lifecycle-ready) -->
        <div class="page-loading">
            <div class="spinner"></div>
            <div class="loading-text">Загрузка...</div>
        </div>

        <!-- Main wrapper -->
        <div class="main-wrapper">
            <!-- Global header -->
            <header class="global-header">
                <div class="header-title">Отчеты</div>
            </header>

            <!-- Content area -->
            <div class="content-area">
                <!-- Step indicator (вне main-section, чтобы tooltip не обрезался overflow:hidden) -->
                <div class="steps-indicator" id="stepsIndicator">
                    <!-- Шаги генерируются динамически -->
                </div>

                <!-- Main section -->
                <main class="main-section">
                    <!-- Main content container (динамический рендеринг) -->
                    <div id="mainContent">
                        <!-- Контент генерируется динамически через UIRenderer -->
                    </div>
                </main>
            </div>
        </div>
    </div>

    <!-- Floating Log Toggle Button -->
    <button class="log-toggle-btn" id="logToggleBtn" title="Журнал операций">
        <img src="../shared/icons/file-text.svg" width="20" height="20" alt="Журнал">
    </button>

    <!-- Slide-out Log Panel -->
    <aside class="log-drawer" id="logDrawer">
        <div class="log-drawer-header">
            <span>Журнал операций</span>
            <div class="log-drawer-actions">
                <button class="btn-clear" id="logClearBtn">Очистить</button>
                <button class="log-drawer-close" id="logCloseBtn">✕</button>
            </div>
        </div>
        <div class="log-drawer-content">
            <div class="log-list" id="logs">
                <div class="log-empty">Нет записей</div>
            </div>
        </div>
    </aside>

    <script src="../shared/version.js"></script>
    <script src="../shared/env-config.js"></script>
    <script src="../shared/cloud-storage.js"></script>
    <script src="../shared/sync-manager.js"></script>
    <script src="../shared/auth-guard.js"></script>
    <script src="../shared/roles-config.js"></script>
    <script src="../shared/role-guard.js"></script>

    <!-- About Modal Container -->
    <div id="about-modal-container"></div>

    <!-- Reset Confirmation Modal -->
    <div class="modal" id="resetModal">
        <div class="modal-dialog">
            <div class="modal-header">
                <h2 class="modal-title">Подтверждение сброса</h2>
                <button class="modal-close" id="resetModalClose">
                    <img src="../shared/icons/cross.svg" width="24" height="24" alt="Закрыть">
                </button>
            </div>
            <div class="modal-body">
                <p>Вы уверены, что хотите начать заново?</p>
                <p><strong>Все загруженные данные будут удалены.</strong></p>
                <div class="modal-footer">
                    <button class="btn btn-primary" id="resetModalCancel">Отмена</button>
                    <button class="btn btn-primary" id="resetModalConfirm">Сбросить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Component Loader -->
    <script src="../shared/js/component-loader.js"></script>
    <script src="../shared/js/sidebar-controller.js"></script>
    <script src="../shared/js/about-modal.js"></script>
    <script src="../shared/js/toast.js"></script>
    <script src="../shared/js/error-handler.js"></script>
    <script src="../shared/js/page-lifecycle.js"></script>

    <!-- Load templates -->
    <script src="templates/combined-report.js"></script>
    <script src="templates/deposits-withdrawals.js"></script>
    <script src="templates/registrations.js"></script>
    <script src="templates/btag.js"></script>
    <script src="templates/analytics-t9.js"></script>
    <script src="templates/active-users.js"></script>
    <script src="templates/templates-loader.js"></script>

    <!-- Modules -->
    <script src="js/modules/utils.js"></script>
    <script src="js/modules/state-manager.js"></script>
    <script src="js/modules/steps-navigator.js"></script>
    <script src="js/modules/file-processor.js"></script>
    <script src="js/modules/ui-renderer.js"></script>

    <!-- Main scripts -->
    <script src="js/logger.js"></script>
    <script src="js/excel-reports.js"></script>
</body>
</html>
