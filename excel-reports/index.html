<!DOCTYPE html>
<html lang="ru">
<head>
    <style>body{background:#0d0d0d}body:not(.lifecycle-ready) .main-wrapper{opacity:0}</style>
    <meta charset="UTF-8">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://accounts.google.com 'sha256-8sMhKaZvp1SL2qx1Dq84c+e0UOH8/W/+D1xMSa4yLts=' 'sha256-vvt4KWwuNr51XfE5m+hzeNEGhiOfZzG97ccfqGsPwvE=' 'sha384-QjwLundxB4NaHWOfxQoy8G+BY7T7kjRSxeKIjdPAUQ76EitE8bUlehJxnQEJquiL' 'sha384-cdYhdOlBc0MtESQfAGUIQ6Mf8mJZZ9E9VOP6SAR7sOvPVvRwQlwQ8UR6AjsGDSW3' 'sha384-/YOimVOt6Bq+nJVuTUHWt8a0+2GkUKsKQKq9P9jNkKqsupthdkM6WWQaaVIlnig/' 'sha384-wgqcWx+Dzs2/x1d1yYLKO34rUT5WhUT+OSqnt51rzc/Hi6CBs3tTpstly4/Hwv2y' 'sha384-sChJXbOWDzAc/w2cKkZyzzTmyVLtLgALn0PCewYcW4Nv4WHOMwANhSAqDFQyu3Iq' 'sha384-WO+CQNc5o8u/05JkylStFXt6f895hAovGF97PqyaWgflx6csiESfjnPzUJUrNAfk'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://accounts.google.com https://cdn.jsdelivr.net; worker-src 'self'">
    <title>Отчеты - AIAdminka</title>
    <link rel="preload" as="font" href="../shared/fonts/TTFirsNeue-Regular.woff2" type="font/woff2" crossorigin>
    <link rel="preload" as="font" href="../shared/fonts/TTFirsNeue-Bold.woff2" type="font/woff2" crossorigin>
    <link rel="icon" type="image/svg+xml" href="../shared/icons/favicon.svg">
    <link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/@preact/signals-core@1.14.1/+esm" integrity="sha384-QjwLundxB4NaHWOfxQoy8G+BY7T7kjRSxeKIjdPAUQ76EitE8bUlehJxnQEJquiL" crossorigin="anonymous">
    <script type="module" src="../shared/js/cdn-deps.js"></script>
    <!-- Phase 32 ROLLOUT-01: components aggregator (registers 4 Lit custom elements via late-binding) -->
    <script type="module" src="../shared/components/index.js"></script>
    <!-- Phase 26-02: cascade order declaration FIRST (BEFORE design-system/components/module) -->
    <link rel="stylesheet" href="../shared/css/_layers.css">
    <link rel="stylesheet" href="../shared/css/design-system.css">
    <link rel="stylesheet" href="css/excel-reports.css">
    <!-- Phase 24 CSS-02: utilities (highest priority @layer utility, loaded LAST per cascade order) -->
    <link rel="stylesheet" href="../shared/css/utilities.css">
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"
            integrity="sha384-Pqp51FUN2/qzfxZxBCtF0stpc9ONI6MYZpVqmo8m20SoaQCzf+arZvACkLkirlPz"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
            defer></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Container -->
        <div id="sidebar-container"></div>

        <!-- Loading state (visible until lifecycle-ready) -->
        <div class="page-loading">
            <div class="spinner"></div>
            <div class="loading-text">Загрузка...</div>
        </div>

        <!-- Main wrapper -->
        <div class="main-wrapper">
            <!-- Global header -->
            <header class="global-header">
                <div class="header-title">Отчеты</div>
            </header>

            <!-- Content area -->
            <div class="content-area">
                <!-- Step indicator (вне main-section, чтобы tooltip не обрезался overflow:hidden) -->
                <div class="steps-indicator" id="stepsIndicator">
                    <!-- Шаги генерируются динамически -->
                </div>

                <!-- Main section -->
                <main class="main-section">
                    <!-- Main content container (динамический рендеринг) -->
                    <div id="mainContent">
                        <!-- Контент генерируется динамически через UIRenderer -->
                    </div>
                </main>
            </div>
        </div>
    </div>

    <!-- Floating Log Toggle Button -->
    <button class="btn btn--ghost log-toggle-btn" id="logToggleBtn" title="Журнал операций">
        <img src="../shared/icons/file-text.svg" width="20" height="20" alt="Журнал">
    </button>

    <!-- Slide-out Log Panel -->
    <aside class="log-drawer" id="logDrawer">
        <div class="log-drawer-header">
            <span>Журнал операций</span>
            <div class="log-drawer-actions">
                <button class="btn btn-sm btn--ghost" id="logClearBtn">Очистить</button>
                <button class="btn btn-sm btn--ghost" id="logCloseBtn">✕</button>
            </div>
        </div>
        <div class="log-drawer-content">
            <div class="log-list" id="logs">
                <div class="log-empty">Нет записей</div>
            </div>
        </div>
    </aside>

    <script src="../shared/version.js"></script>
    <script src="../shared/env-config.js"></script>
    <script src="../shared/cloud-storage.js"></script>
    <script src="../shared/sync-manager.js"></script>
    <script src="../shared/utils.js"></script>
    <script src="../shared/auth-guard.js"></script>
    <script src="../shared/roles-config.js"></script>
    <script src="../shared/role-guard.js"></script>

    <!-- About Modal Container -->
    <div id="about-modal-container"></div>

    <!-- Component Loader -->
    <script src="../shared/js/toast.js"></script>
    <script src="../shared/js/error-handler.js"></script>
    <script src="../shared/js/component-loader.js"></script>
    <script src="../shared/js/sidebar-controller.js"></script>
    <script src="../shared/js/about-modal.js"></script>
    <script src="../shared/js/confirm-modal.js"></script>
    <script src="../shared/js/page-lifecycle.js"></script>

    <!-- Phase 21 utilities -->
    <script src="../shared/js/event-manager.js"></script>

    <!-- Phase 24 ModuleFactory (signals + EventManager + OptimisticManager + CRUD) -->
    <script src="../shared/js/module-factory.js"></script>

    <!-- Load templates -->
    <script src="templates/combined-report.js"></script>
    <script src="templates/deposits-withdrawals.js"></script>
    <script src="templates/registrations.js"></script>
    <script src="templates/btag.js"></script>
    <script src="templates/analytics-t9.js"></script>
    <script src="templates/active-users.js"></script>
    <script defer src="templates/templates-loader.js"></script>

    <!-- Modules (defer: ждут module scripts (cdn-deps) для window.signal/computed/effect) -->
    <script defer src="js/modules/utils.js"></script>
    <script defer src="js/modules/state-manager.js"></script>
    <script defer src="js/modules/steps-navigator.js"></script>
    <script defer src="js/modules/file-processor.js"></script>
    <script defer src="js/modules/ui-renderer.js"></script>

    <!-- Main scripts -->
    <script defer src="js/logger.js"></script>
    <script defer src="js/excel-reports.js"></script>
</body>
</html>
