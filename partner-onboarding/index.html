<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://accounts.google.com; style-src 'self'; img-src 'self' data: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://accounts.google.com ws://127.0.0.1:5500 ws://localhost:5500; frame-ancestors 'self'">
    <title>Заведение партнёра - AIAdminka</title>
    <link rel="icon" type="image/svg+xml" href="../shared/icons/favicon.svg">
    <link rel="stylesheet" href="../shared/css/design-system.css">
    <link rel="stylesheet" href="css/partner-onboarding.css">
</head>
<body>
    <div class="app-container">
        <div id="sidebar-container" data-component="sidebar"></div>

        <div class="page-loading">
            <div class="spinner"></div>
            <div class="loading-text">Загрузка...</div>
        </div>

        <div class="main-wrapper">
            <header class="global-header">
                <div class="header-left">
                    <button class="btn btn-ghost btn-back hidden" id="btnBack" data-action="onb-back">
                        <img src="../shared/icons/arrow-left.svg" width="16" height="16" alt="Назад">
                        Назад
                    </button>
                    <div class="header-title" id="headerTitle">Заведение партнёра</div>
                    <span class="header-request-id hidden" id="headerRequestId"></span>
                </div>
                <div class="header-actions" id="headerActions">
                    <!-- Dynamic: Cancel / Reactivate buttons for admin/leader -->
                </div>
            </header>

            <div class="content-area">
                <!-- VIEW: List -->
                <div class="onb-view" id="viewList">
                    <div class="list-toolbar">
                        <div class="list-filters">
                            <div class="filter-tabs" id="ownershipFilter">
                                <button class="filter-tab active" data-action="onb-filterOwnership" data-value="my">Мои</button>
                                <button class="filter-tab" data-action="onb-filterOwnership" data-value="review">На проверку</button>
                                <button class="filter-tab" data-action="onb-filterOwnership" data-value="all">Все</button>
                            </div>
                            <select class="form-select filter-status" id="statusFilter" data-action="onb-filterStatus">
                                <option value="">Все статусы</option>
                                <option value="in_progress">В работе</option>
                                <option value="on_review">На проверке</option>
                                <option value="completed">Завершено</option>
                                <option value="cancelled">Отменено</option>
                            </select>
                        </div>
                        <div class="list-right">
                            <div class="search-box">
                                <img class="search-icon" src="../shared/icons/search.svg" width="16" height="16" alt="Поиск">
                                <input type="text" class="form-input search-input" id="searchInput" placeholder="Поиск..." data-action="onb-search">
                            </div>
                            <button class="btn btn-primary" id="btnNewRequest" data-action="onb-newRequest">Новая заявка</button>
                        </div>
                    </div>

                    <div class="requests-list" id="requestsList">
                        <!-- Generated by JS -->
                    </div>

                    <div class="loading-state hidden" id="listLoading">
                        <div class="spinner"></div>
                        <div class="loading-text">Загрузка заявок...</div>
                    </div>

                    <div class="empty-state hidden" id="listEmpty">
                        <img class="empty-state-icon" src="../shared/icons/partners.svg" width="48" height="48" alt="">
                        <div class="empty-state-title">Заявок нет</div>
                        <div class="empty-state-text">Создайте первую заявку на заведение партнёра</div>
                        <button class="btn btn-primary" data-action="onb-newRequest">Новая заявка</button>
                    </div>
                </div>

                <!-- VIEW: Form (executor) -->
                <div class="onb-view hidden" id="viewForm">
                    <div class="onb-steps" id="formSteps">
                        <!-- Generated by onboarding-steps.js -->
                    </div>

                    <div class="onb-banner hidden" id="formBanner">
                        <!-- Reject comment from reviewer -->
                    </div>

                    <div class="onb-scroll" id="formScroll">
                        <div class="onb-prev-steps" id="formPrevSteps">
                            <!-- Previous steps readonly -->
                        </div>
                        <div class="onb-form-fields" id="formFields">
                            <!-- Current step form fields -->
                        </div>
                    </div>

                    <div class="onb-actions" id="formActions">
                        <button class="btn btn-ghost" data-action="onb-saveDraft">Сохранить</button>
                        <button class="btn btn-primary" id="btnFormSubmit" data-action="onb-submit">Отправить</button>
                    </div>
                </div>

                <!-- VIEW: Review (reviewer) -->
                <div class="onb-view hidden" id="viewReview">
                    <div class="onb-steps" id="reviewSteps">
                        <!-- Generated by onboarding-steps.js -->
                    </div>

                    <div class="onb-review-header" id="reviewHeader">
                        <!-- Step name + status badge -->
                    </div>

                    <div class="onb-scroll" id="reviewScroll">
                        <div class="onb-prev-steps" id="reviewPrevSteps">
                            <!-- Previous steps readonly -->
                        </div>
                        <div class="onb-review-fields" id="reviewFields">
                            <!-- Current step data readonly -->
                        </div>
                        <div class="onb-history" id="reviewHistory">
                            <!-- Action history -->
                        </div>
                    </div>

                    <div class="onb-actions" id="reviewActions">
                        <div class="review-comment-row">
                            <textarea class="form-textarea" id="reviewComment" placeholder="Комментарий (обязателен при возврате)..." rows="2"></textarea>
                        </div>
                        <div class="review-buttons">
                            <button class="btn btn-ghost" data-action="onb-reject">Вернуть</button>
                            <div class="review-buttons-right">
                                <button class="btn btn-ghost" id="btnWithdraw" data-action="onb-withdraw">Отозвать</button>
                                <button class="btn btn-primary" data-action="onb-approve">Одобрить</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Reassign Modal -->
    <div class="modal" id="reassignModal">
        <div class="modal-dialog modal-dialog-sm">
            <div class="modal-header">
                <h2 class="modal-title">Передать заявку</h2>
                <button class="modal-close" data-action="onb-closeReassign">
                    <img src="../shared/icons/cross.svg" width="16" height="16" alt="Закрыть">
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Менеджер</label>
                    <select class="form-select" id="reassignTarget">
                        <option value="">Выберите менеджера</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Причина</label>
                    <select class="form-select" id="reassignReason">
                        <option value="">Выберите причину</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Комментарий</label>
                    <textarea class="form-textarea" id="reassignComment" rows="2" placeholder="Необязательно..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" data-action="onb-closeReassign">Отмена</button>
                <button class="btn btn-primary" data-action="onb-confirmReassign">Передать</button>
            </div>
        </div>
    </div>

    <!-- Rollback Modal -->
    <div class="modal" id="rollbackModal">
        <div class="modal-dialog modal-dialog-sm">
            <div class="modal-header">
                <h2 class="modal-title">Откатить на шаг</h2>
                <button class="modal-close" data-action="onb-closeRollback">
                    <img src="../shared/icons/cross.svg" width="16" height="16" alt="Закрыть">
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Откатить на</label>
                    <select class="form-select" id="rollbackTarget">
                        <!-- Generated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Комментарий</label>
                    <textarea class="form-textarea" id="rollbackComment" rows="2" placeholder="Причина отката..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" data-action="onb-closeRollback">Отмена</button>
                <button class="btn btn-primary" data-action="onb-confirmRollback">Откатить</button>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal" id="confirmModal">
        <div class="modal-dialog modal-dialog-sm">
            <div class="modal-header">
                <h2 class="modal-title" id="confirmTitle">Подтверждение</h2>
            </div>
            <div class="modal-body">
                <p id="confirmMessage"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" data-action="onb-closeConfirm">Отмена</button>
                <button class="btn btn-danger" id="confirmOk" data-action="onb-confirmAction">Подтвердить</button>
            </div>
        </div>
    </div>

    <!-- About Modal Container -->
    <div id="about-modal-container" data-component="about-modal"></div>

    <!-- DEV: Role Switcher (localhost only) -->
    <div class="dev-role-switcher hidden" id="roleSwitcher">
        <span class="dev-label">DEV:</span>
        <button class="dev-role-btn" data-action="onb-devRole" data-value="admin">Admin</button>
        <button class="dev-role-btn" data-action="onb-devRole" data-value="sales">Sales</button>
        <button class="dev-role-btn active" data-action="onb-devRole" data-value="assistant">Reviewer</button>
    </div>

    <script src="../shared/version.js"></script>
    <script src="../shared/storage.js"></script>
    <script src="../shared/env-config.js"></script>
    <script src="../shared/cloud-storage.js"></script>
    <script src="../shared/sync-manager.js"></script>
    <script src="../shared/auth-guard.js"></script>
    <script src="../shared/roles-config.js"></script>
    <script src="../shared/role-guard.js"></script>
    <script src="../shared/utils.js"></script>
    <script src="../shared/js/component-loader.js"></script>
    <script src="../shared/js/sidebar-controller.js"></script>
    <script src="../shared/js/about-modal.js"></script>
    <script src="../shared/js/toast.js"></script>
    <script src="../shared/js/error-handler.js"></script>
    <script src="../shared/js/page-lifecycle.js"></script>

    <script src="js/modules/onboarding-config.js"></script>
    <script src="js/modules/onboarding-state.js"></script>
    <script src="js/modules/onboarding-list.js"></script>
    <script src="js/modules/onboarding-steps.js"></script>
    <script src="js/modules/onboarding-form.js"></script>
    <script src="js/modules/onboarding-review.js"></script>
    <script src="js/partner-onboarding.js"></script>
</body>
</html>
